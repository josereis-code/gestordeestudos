<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban de Estudos — Gestão Visual Simples</title>
  <meta name="description" content="Plataforma de gestão visual de estudos via Kanban 100% manual.">
  <meta name="keywords" content="concursos públicos, estudos, kanban, gestão de estudos">
  <meta name="theme-color" content="#0a0a14">

  <!-- Open Graph -->
  <meta property="og:title" content="Kanban de Estudos">
  <meta property="og:description" content="Gestão visual minimalista para seus estudos">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!--
    AgenteEstudos — SPA (Single Page Application)
    Toda a renderização é feita via JavaScript.
    O div #app é o ponto de montagem da aplicação.
  -->
  <div id="app">
    <!-- Splash de carregamento inicial -->
    <div style="
      display:flex; align-items:center; justify-content:center;
      height:100vh; flex-direction:column; gap:16px;
      background:#070711; color:#f0f0ff;
    ">
      <div style="
        width:56px; height:56px;
        background:linear-gradient(135deg,#6366f1,#a855f7);
        border-radius:16px; display:flex; align-items:center;
        justify-content:center; font-size:28px;
        box-shadow:0 0 30px rgba(99,102,241,0.5);
        animation:logoSpin 2s ease infinite;
      ">🗂️</div>
      <div style="font-size:18px;font-weight:700;letter-spacing:-0.5px">Kanban de Estudos</div>
      <div style="font-size:13px;color:#64748b">Carregando quadro...</div>
    </div>
  </div>

  <style>
    @keyframes logoSpin {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
  </style>

  <!-- Bibliotecas Externas -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!--
    ══════════════════════════════════════════════
    SCRIPTS — Ordem de carregamento é importante!
    ══════════════════════════════════════════════
    1. config.js    → Constantes e configurações globais
    2. db.js        → Camada de dados (localStorage)
    3. app.js       → Controlador principal + Views + Actions
  -->
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
